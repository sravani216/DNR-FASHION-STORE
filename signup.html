<!DOCTYPE html>
<html>
<head>
    <title>SIGNUP</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>

<!-- 🔝 NAVBAR -->
<div class="header">
    <div class="left">
        <img src="favicon.png" class="logo">
        <h2>DNR</h2>
        <span class="tagline">Level up your wardrobe</span>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
    </div>

    <div class="right">
        <a href="index.html">PRODUCTS</a>
        <a href="cart.html">CART</a>
        <a href="account.html">ACCOUNT</a>
        <span class="menu" onclick="toggleMenu()">☰</span>
    </div>
</div>

<!-- 📱 DROPDOWN MENU -->
<div id="menuBox" style="display:none; position:absolute; right:20px; top:70px; background:white; padding:15px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1);">
    <a href="index.html">PRODUCTS</a><br><br>
    <a href="cart.html">CART</a><br><br>
    <a href="account.html">ACCOUNT</a>
</div>

<!-- 📦 CONTENT -->
<div class="container">

<h2 style="text-transform: uppercase;">USER SIGNUP</h2>

<form id="signupForm">
    <input type="text" id="name" placeholder="Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>

    <button type="submit">Signup</button>
</form>

<p id="msg"></p>

<p>Already have an account? <a href="login.html">Login</a></p>

</div>

<script>
function toggleMenu() {
    const menu = document.getElementById("menuBox");
    menu.style.display = menu.style.display === "none" ? "block" : "none";
}

document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    try {
        const res = await fetch("/signup", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (result.success) {
            alert("Signup successful! Redirecting...");
            window.location.href = "login.html";
        } else {
            document.getElementById("msg").innerText = result.message || "Signup failed";
        }

    } catch (err) {
        document.getElementById("msg").innerText = "Something went wrong";
        console.log(err);
    }
});
</script>

</body>
</html>
