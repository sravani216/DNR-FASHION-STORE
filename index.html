<!DOCTYPE html>
<html>
<head>
    <title>PRODUCTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>

<div class="header">
    <div class="left">
        <img src="favicon.png" class="logo">
        <h2>DNR</h2>
        <span class="tagline">Level up your wardrobe</span>
    </div>

    <div class="right">
        <a href="index.html">PRODUCTS</a>
        <a href="cart.html">CART</a>
        <a href="account.html">ACCOUNT</a>
        <span class="menu" onclick="toggleMenu()">☰</span>
    </div>
</div>

<div id="menuBox" style="display:none; position:absolute; right:20px; top:70px; background:white; padding:15px; border-radius:10px;">
    <a href="index.html">PRODUCTS</a><br><br>
    <a href="cart.html">CART</a><br><br>
    <a href="account.html">ACCOUNT</a>
</div>

<div class="container">
    <h2>PRODUCTS</h2>
    <div id="products" style="display:flex; flex-wrap:wrap; gap:20px;"></div>
</div>

<script>

// 🔐 Protect page
const role = localStorage.getItem("role");
const email = localStorage.getItem("email");

if (!role || !email) {
    window.location.href = "login.html";
}

// 📱 Toggle menu
function toggleMenu() {
    const menu = document.getElementById("menuBox");
    menu.style.display = menu.style.display === "none" ? "block" : "none";
}

// 📦 Load products
async function loadProducts() {
    try {
        const res = await fetch("/products");

        const products = await res.json();

        const container = document.getElementById("products");
        container.innerHTML = "";

        if (!products || products.length === 0) {
            container.innerHTML = "<p>No products available</p>";
            return;
        }

        products.forEach(product => {
            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <img src="${product.image}" style="width:150px; height:150px; object-fit:cover;">
                <h3>${product.name}</h3>
                <p>₹${product.price}</p>
                <button onclick="addToCart(${product.id})">Add to Cart</button>
            `;

            container.appendChild(div);
        });

    } catch (err) {
        console.error(err);
        document.getElementById("products").innerHTML = "Error loading products";
    }
}

// 🛒 Add to cart
async function addToCart(id) {
    try {
        const res = await fetch("/add-to-cart", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                productId: id,
                email: email // ✅ always use stored email
            })
        });

        const data = await res.json();

        if (data.success) {
            alert("Added to cart");
        } else {
            alert("Error adding to cart");
        }

    } catch (err) {
        console.error(err);
        alert("Server error");
    }
}

// load products
loadProducts();

</script>

</body>
</html>
