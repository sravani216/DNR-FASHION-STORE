<!DOCTYPE html>
<html>
<head>
    <title>LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>

<div class="header">
    <div class="left">
        <img src="favicon.png" class="logo">
        <h2>DNR</h2>
        <span class="tagline">Level up your wardrobe</span>
    </div>

    <div class="right">
        <a href="index.html">PRODUCTS</a>
        <a href="cart.html">CART</a>
        <a href="account.html">ACCOUNT</a>
        <span class="menu" onclick="toggleMenu()">☰</span>
    </div>
</div>

<div id="menuBox" style="display:none; position:absolute; right:20px; top:70px; background:white; padding:15px; border-radius:10px;">
    <a href="index.html">PRODUCTS</a><br><br>
    <a href="cart.html">CART</a><br><br>
    <a href="account.html">ACCOUNT</a>
</div>

<div class="container">
    <h2>LOGIN</h2>

    <form onsubmit="loginUser(event)">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p id="msg"></p>
</div>

<script>
function toggleMenu() {
    const menu = document.getElementById("menuBox");
    menu.style.display = menu.style.display === "none" ? "block" : "none";
}

async function loginUser(event) {
    event.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    try {
        const res = await fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.success) {

            // ✅ ALWAYS store email + role
            localStorage.setItem("email", email);
            localStorage.setItem("role", data.role);

            if (data.role === "admin") {
                window.location.href = "add-product.html";
            } else {
                window.location.href = "index.html";
            }

        } else {
            document.getElementById("msg").innerText = "Invalid email or password";
        }

    } catch (err) {
        console.error(err);
        document.getElementById("msg").innerText = "Server error";
    }
}
</script>

</body>
</html>
