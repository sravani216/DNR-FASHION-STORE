<!DOCTYPE html>
<html>
<head>
    <title>CART</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>

<div class="header">
    <div class="left">
        <img src="favicon.png" class="logo">
        <h2>DNR</h2>
        <span class="tagline">Level up your wardrobe</span>
    </div>

    <div class="right">
        <a href="index.html">PRODUCTS</a>
        <a href="cart.html">CART</a>
        <a href="account.html">ACCOUNT</a>
        <span class="menu" onclick="toggleMenu()">☰</span>
    </div>
</div>

<div id="menuBox" style="display:none; position:absolute; right:20px; top:70px; background:white; padding:15px; border-radius:10px;">
    <a href="index.html">PRODUCTS</a><br><br>
    <a href="cart.html">CART</a><br><br>
    <a href="account.html">ACCOUNT</a>
</div>

<div class="container">
    <h2>YOUR CART</h2>
    <div id="cart"></div>

    <br>

    <a href="checkout.html">
        <button>Checkout</button>
    </a>
</div>

<script>

// 🔐 Protect page
const role = localStorage.getItem("role");
const email = localStorage.getItem("email");

if (!role || !email) {
    window.location.href = "login.html";
}

// 📱 Toggle menu
function toggleMenu() {
    const menu = document.getElementById("menuBox");
    menu.style.display = menu.style.display === "none" ? "block" : "none";
}

// 🛒 Load cart
async function loadCart() {
    try {
        const res = await fetch("/cart", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email })
        });

        const items = await res.json();

        const container = document.getElementById("cart");
        container.innerHTML = "";

        let total = 0;

        if (!items || items.length === 0) {
            container.innerHTML = "<h3>Cart is empty</h3>";
            return;
        }

        items.forEach(item => {
            total += item.price * item.quantity;

            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
    <h3>${item.name}</h3>
    <p>Price: ₹${item.price}</p>
    <p>Quantity: ${item.quantity}</p>

    <button onclick="removeItem(${item.product_id})">
        Remove
    </button>
`;

            container.appendChild(div);
        });

        const totalDiv = document.createElement("h3");
        totalDiv.innerText = "TOTAL: ₹" + total;

        container.appendChild(totalDiv);

    } catch (err) {
        console.error(err);
        document.getElementById("cart").innerHTML = "Error loading cart";
    }
}

// ✅ IMPORTANT — CALL FUNCTION
loadCart();

async function removeItem(id) {
    const email = localStorage.getItem("email");

    try {
        const res = await fetch("/remove-from-cart", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                productId: id,
                email: email
            })
        });

        const data = await res.json();

        if (data.success) {
            location.reload();
        } else {
            alert("Error removing item");
        }

    } catch (err) {
        console.error(err);
        alert("Server error");
    }
}
</script>

</body>
</html>
